all:
  hosts:
    pm-gatesr2:
      ansible_port: 2225
      ansible_host: 10.11.1.1
      ansible_user: ansible
      ansible_ssh_private_key_file: "~/.ssh/admin@zpesystems.com"
      vms:
        - name: vmansible
          ram:  
            size: 2048 # size in MB
          cpu:
            count: 2
          disks:
            #          - file: /var/lib/libvirt/images/vmansible.qcow2 # VM disk file on kvm domain
            #            file_source: https://cloud.debian.org/images/cloud/sid/daily/latest/debian-sid-generic-amd64-daily.qcow2 # file to be fetch or copied
            #            type: url # url, local_file, copy_local_file
            - file: /var/lib/libvirt/images/vmansible.qcow2 # VM disk file on kvm domain
              #file_source: vm_images/ECV-9.2.4.0_94654-original.qcow2 
              file_source: vm_images/debian-sid-generic-amd64-daily.qcow2 
              type: copy_local_file # url, local_file, copy_local_file
          network_bridges:
            - MGMT0
            - WAN0
            - WAN1
            - LAN0
          cloud_init:
            user_data: "cloudinit/user-data"
            meta_data: "cloudinit/meta-data"
            user_data_remote: "/tmp/user-data"
            meta_data_remote: "/tmp/meta-data"
            iso_file: /var/lib/libvirt/images/seed1.iso
      licenses:
        - "xxxxx-xxxxx-xxxxx-xxxxx"
      hostname: "pm-gatesr2"
      domain_name: "pm.zpesystems.local"
      dns_proxy: 192.168.11.1
      enable_ipv4_ip_forward: "yes"
      enable_ipv6_ip_forward: "no"
      reverse_path_filtering: "strict_mode"
      enable_multiple_routing_tables: "yes"
      enable_network_failover: "no"
      enable_primary_failover_by_ip_address: "yes"
      trigger: "ipv4_default_gateway"
      enable_primary_failover_by_signal_strength: "no"
      enable_primary_failover_by_data_usage: "no"
      enable_primary_failover_by_schedule: "no"
      enable_primary_sim_failback_by_schedule: "no"
      enable_third_level_network_failover: "no"
      enable_secondary_failover_by_ip_address: "yes"
      secondary_trigger: "secondary_ipv4_default_gateway"
      enable_secondary_failover_by_signal_strength: "no"
      enable_secondary_failover_by_data_usage: "no"
      enable_secondary_failover_by_schedule: "no"
      enable_secondary_sim_failback_by_schedule: "no"
      enable_dynamic_dns: "no"
      enable_bluetooth_network: "yes"
      #######
      address_location:
      coordinates:
      help_url: "https://docs.zpesystems.com/nodegrid/docs"
      idle_timeout: "3600"
      revision_tag: "r1"
      show_hostname_on_webui_header: "yes"
      logo_image_selection: "no"
      logo_image: "use_default_logo_image"
      logo_download_url:
      logo_download_username:
      logo_download_password:
      logo_download_path_is_absolute_path_name: "no"
      enable_banner: "no"
      enable_local_serial_ports_utilization_rate: "no"
      enable_license_utilization_rate: "yes"
      percentage_to_trigger_events: "90"
      console_port_speed: "115200"
      enable_alarm_sound_when_one_power_supply_is_powered_off: "no"
      enable_alarm_sound_on_fan_failure: "yes"
      unit_ipv4_address: "192.168.160.1"
      unit_netmask: "255.255.255.0"
      unit_ipv4_gateway:
      unit_interface: "eth0"
      iso_url: "http://ServerIPAddress/PATH/FILENAME.ISO"
      ####
      enable_detection_of_usb_devices: "yes"
      enable_rpc: "no"
      enable_grpc: "no"
      enable_ftp_service: "no"
      enable_snmp_service: "yes"
      enable_telnet_service_to_nodegrid: "no"
      enable_telnet_service_to_managed_devices: "no"
      enable_icmp_echo_reply: "yes"
      enable_icmp_secure_redirects: "yes"
      enable_usb_over_ip: "no"
      enable_search_engine: "yes"
      enable_dashboards: "yes"
      enable_telegraf: "no"
      enable_services_status_page: "yes"
      enable_reboot_on_services_status_page: "yes"
      enable_vmware_manager: "no"
      enable_docker: "yes"
      enable_qemu|kvm: "yes"
      cluster_tcp_port: "9966"
      auto_cluster_enroll: "yes"
      search_engine_tcp_port: "9300"
      enable_search_engine_high_level_cipher_suite: "no"
      enable_vm_serial_access: "yes"
      vm_serial_port: "9977"
      vmotion_timeout: "300"
      enable_zero_touch_provisioning: "yes"
      enable_bluetooth: "yes"
      bluetooth_display_name: "GateSR_230354222"
      bluetooth_discoverable_mode: "yes"
      enable_pxe: "yes"
      device_access_per_user_group_authorization: "no"
      enable_autodiscovery: "yes"
      dhcp_lease_per_autodiscovery_rules: "no"
      block_host_with_multiple_authentication_failures: "no"
      block_account_with_multiple_authentication_failures: "no"
      enable_console_access: "yes"
      allow_root_console_access: "no"
      rescue_mode_require_authentication: "no"
      password_protected_boot: "no"
      boot_mode: "uefi"
      enable_secure_boot: "yes"
      ssh_allow_root_access: "no"
      ssh_tcp_port: "22"
      ssh_ciphers: 
      ssh_macs: 
      ssh_kexalgorithms: 
      enable_http_access: "yes"
      http_port: "80"
      enable_https_access: "yes"
      https_port: "443"
      redirect_http_to_https: "yes"
      enable_https_file_repository: "no"
      frr_enable_bgp: "yes"
      frr_enable_ospfv2: "no"
      frr_enable_ospfv3: "no"
      frr_enable_rip: "no"
      frr_enable_vrrp: "no"
      tlsv1.3: "yes"
      tlsv1.2: "yes"
      tlsv1.1: "no"
      tlsv1: "no"
      cipher_suite_level: "medium"
      ipv4_nat:
          chains:
            PREROUTING: []
            INPUT: []
            OUTPUT: []
            POSTROUTING:
              - target: MASQUERADE
                rule_number: 1
                source_net4: 192.168.11.0/24
                destination_net4: 
                protocol: numeric
                protocol_number: 
                output_interface: "any"
                fragments: all_packets_and_fragments
                reverse_match_for_source_ip|mask: "no"
                reverse_match_for_destination_ip|mask: "no"
                reverse_match_for_source_port: "no"
                reverse_match_for_destination_port: "no"
                reverse_match_for_protocol: "no"
                reverse_match_for_tcp_flags: "no"
                reverse_match_for_icmp_type: "no"
                enable_state_match: "no"
                reverse_match_for_output_interface: "no"
                to_source:  
                to_destination: 
                log_level: debug
                log_prefix: 
                log_tcp_sequence_numbers: "no"
                log_options_from_the_tcp_packet_header: "no"
                log_options_from_the_ip_packet_header: "no"
      dhcp_server:
          - subnet: 192.168.11.0
            netmask: 255.255.255.0
            domain:
            domain_name_servers: 192.168.11.1
            lease_time:
            protocol: dhcp4 # dhcp4  dhcp6 
            router_ip: 192.168.11.1
            wifi_controller_ip: 
            network_range:
              - ip_address_start: 192.168.11.10
                ip_address_end: 192.168.11.100
      switch_vlans:
          - vlan: 200
            tagged_ports: "" # comma separated list
            untagged_ports: "backplane0,netS2,netS3,netS4,netS5,netS6,netS7" # comma separated list
          - vlan: 254
            tagged_ports: "netS8" # comma separated list
            untagged_ports: "" # comma separated list
      network_connections:
          - name: VLAN254  # not editable
            type: vlan  # not editable
            ethernet_interface: backplane0
            vlan_id: 254 
            description: "vlan254"
            set_as_primary_connection: 'no'
            block_unsolicited_incoming_packets: 'no'
            ethernet_link_mode: auto  # not editable
            enable_ip_passthrough: 'no'
            ipv4_mode: dhcp # dhcp no_ipv4_address static
            enable_lldp: "no"
          - name: MGMT0
            type: bridge # analog_modem, bonding, bridge, ethernet, loopback, mobile_broadband_gsm, pppoe, vlan, wifi
            description: 'MGMT PORT' 
            bridge_interfaces: lo1
            enable_lldp: 'no'
            bridge_mac_configuration: bridge_custom_mac
            enable_spanning_tree_protocol: "no"
            ipv4_mode: static # dhcp no_ipv4_address static
            ipv4_address: 192.168.11.1
            ipv4_bitmask: 24
            ipv4_default_route_metric: 425
            ipv4_ignore_obtained_default_gateway: 'no'
            ipv4_ignore_obtained_dns_server: 'no'
            ipv6_mode: no_ipv6_address
            ipv6_ignore_obtained_default_gateway: 'no'
            ipv6_ignore_obtained_dns_server: 'no'
          - name: MGMT1
            type: bridge # analog_modem, bonding, bridge, ethernet, loopback, mobile_broadband_gsm, pppoe, vlan, wifi
            description: 'MGMT lanbrd' 
            bridge_interfaces: lan1
            enable_lldp: 'no'
            bridge_mac_configuration: bridge_custom_mac
            enable_spanning_tree_protocol: "no"
            ipv4_mode: static # dhcp no_ipv4_address static
            ipv4_address: 192.168.10.1
            ipv4_bitmask: 24
            ipv4_ignore_obtained_default_gateway: 'no'
            ipv4_ignore_obtained_dns_server: 'no'
            ipv6_mode: no_ipv6_address
            ipv6_ignore_obtained_default_gateway: 'no'
            ipv6_ignore_obtained_dns_server: 'no'
          - name: LAN0
            type: bridge
            ipv4_mode: no_ipv4_address # dhcp no_ipv4_address static
            description: 'LAN' 
            bridge_interfaces: backplane0
            enable_lldp: "no"
            enable_spanning_tree_protocol: "no"
          - name: WAN0
            type: bridge
            ipv4_mode: no_ipv4_address # dhcp no_ipv4_address static
            description: 'wan0 bridge' 
            bridge_interfaces: lo1
            enable_lldp: "no"
            enable_spanning_tree_protocol: "no"
          - name: WAN1
            type: bridge
            ipv4_mode: no_ipv4_address # dhcp no_ipv4_address static
            description: "wan1 bridge"
            bridge_interfaces: lo1
            enable_lldp: "no"
            enable_spanning_tree_protocol: "no"
          - name: SFP0
            type: ethernet
            description: "wan1"
            connect_automatically: "yes"
            ethernet_interface: sfp0
            set_as_primary_connection: "no"
            enable_lldp: "no"
            block_unsolicited_incoming_packets: "no"
            configure_hostname_through_dhcp: "no"
            ethernet_link_mode: auto
            ipv4_mode: no_ipv4_address # dhcp no_ipv4_address static
            ipv4_dns_server:
            ipv4_dns_search:
            ipv4_default_route_metric: 100
            ipv4_ignore_obtained_default_gateway: "no"
            ipv4_ignore_obtained_dns_server: "no"
            ipv6_mode: no_ipv6_address
            ipv6_dns_server:
            ipv6_dns_search:
            ipv6_default_route_metric: 100
            ipv6_ignore_obtained_default_gateway: "no"
            ipv6_ignore_obtained_dns_server: "no"
            enable_ip_passthrough: "yes"
            ethernet_connection: WAN0
          - name: SFP1
            type: ethernet
            description: "wan2"
            connect_automatically: "yes"
            ethernet_interface: sfp1
            set_as_primary_connection: "no"
            enable_lldp: "no"
            block_unsolicited_incoming_packets: "no"
            configure_hostname_through_dhcp: "no"
            ethernet_link_mode: auto
            ipv4_mode: no_ipv4_address # dhcp no_ipv4_address static
            ipv4_dns_server:
            ipv4_dns_search:
            ipv4_default_route_metric: 100
            ipv4_ignore_obtained_default_gateway: "no"
            ipv4_ignore_obtained_dns_server: "no"
            ipv6_mode: no_ipv6_address
            ipv6_dns_server:
            ipv6_dns_search:
            ipv6_default_route_metric: 100
            ipv6_ignore_obtained_default_gateway: "no"
            ipv6_ignore_obtained_dns_server: "no"
            enable_ip_passthrough: "yes"
            ethernet_connection: WAN1
